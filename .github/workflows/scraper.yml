name: Obilet Uçuş Scraper

on:
  # Her gün saat 08:00 UTC'de otomatik çalış
  schedule:
    - cron: "0 8 * * *"

  # Manuel de tetiklenebilsin
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v4

      - name: ⚙️ Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Bağımlılıkları yükle
        run: npm ci

      - name: 🌐 Chrome bağımlılıklarını yükle
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 \
            libgbm1 libasound2 libxshmfence1

      - name: ✈️ Scraper'ı çalıştır
        run: npm start

      - name: 💾 Güncel verileri commit et
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Otomatik: Uçuş fiyatları güncellendi [$(date +'%d.%m.%Y %H:%M')]"
          file_pattern: "fiyatlar.json public/data.json"